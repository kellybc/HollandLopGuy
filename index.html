<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Road Dash</title>
  <style>
    :root {
      font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
      color: #0f172a;
      background: #0b1021;
    }

    body {
      margin: 0;
      display: grid;
      min-height: 100vh;
      place-items: center;
    }

    .frame {
      background: radial-gradient(circle at 50% -10%, #1e2a58 10%, #0b1021 75%);
      border: 1px solid #19223d;
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5), 0 0 0 4px rgba(255, 255, 255, 0.02);
      border-radius: 16px;
      padding: 18px 20px 12px;
      position: relative;
    }

    h1 {
      color: #e2e8f0;
      font-size: 20px;
      margin: 0 0 10px;
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .indicator {
      width: 10px;
      height: 10px;
      background: linear-gradient(120deg, #22c55e, #16a34a);
      border-radius: 50%;
      box-shadow: 0 0 12px rgba(34, 197, 94, 0.8);
      display: inline-block;
    }

    canvas {
      display: block;
      background: linear-gradient(#0b1021, #0b1021 40%, #0a0c18);
      border-radius: 12px;
      border: 1px solid #11182f;
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(3, auto);
      gap: 12px 18px;
      margin: 12px 0 0;
      color: #cbd5e1;
      font-size: 14px;
      letter-spacing: 0.02em;
    }

    .pill {
      padding: 6px 10px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .timer-pill {
      position: absolute;
      top: 12px;
      right: 14px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
    }

    .pill strong {
      color: #e2e8f0;
    }

    .status {
      grid-column: 1 / -1;
      color: #cbd5e1;
    }

    .status strong {
      color: #e2e8f0;
    }

    .status.good strong {
      color: #22c55e;
    }

    .status.bad strong {
      color: #f97316;
    }

    .status.win strong {
      color: #38bdf8;
    }

    .muted {
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="frame">
    <h1><span class="indicator"></span> Road Dash</h1>
    <div class="pill timer-pill"><strong>Time:</strong> <span id="timer">0.000</span> s</div>
    <canvas id="gameCanvas" width="900" height="540" aria-label="Road driving game"></canvas>
    <div class="hud" id="hud">
      <div class="pill"><strong>Speed:</strong> <span id="speed">0</span> mph</div>
      <div class="pill"><strong>Distance:</strong> <span id="distance">0</span> m</div>
      <div class="pill"><strong>Obstacles:</strong> <span id="obstacles">0</span></div>
      <div class="pill"><strong>Goal:</strong> Reach the finish without crashing.</div>
      <div class="pill"><strong>Controls:</strong> Arrow keys steer + accelerate.</div>
      <div class="status" id="status">Drive forward and avoid debris. Reach the glowing finish strip!</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const hud = {
      speed: document.getElementById("speed"),
      distance: document.getElementById("distance"),
      obstacles: document.getElementById("obstacles"),
      timer: document.getElementById("timer"),
      status: document.getElementById("status"),
    };

    const road = {
      width: 360,
      laneMarkingWidth: 4,
      shoulder: 40,
      length: 2600,
    };

    const SPEED_MPH_PER_UNIT = 12 * 0.621371; // Keep HUD tied to a real-world-ish mph scale
    const TARGET_MAX_MPH = 50;
    const COLLISION_STOP_DURATION_MS = 2000;
    const FLASH_CYCLE_COUNT = 3;

    const car = {
      x: 0,
      speed: 0,
      maxSpeed: TARGET_MAX_MPH / SPEED_MPH_PER_UNIT,
      acceleration: 0.1,
      steering: 5,
      width: 28,
      height: 60,
      distance: 0,
    };

    const camera = {
      baseY: canvas.height - 120,
    };

    const state = {
      keys: new Set(),
      obstacles: [],
      finished: false,
      confetti: [],
      lastTime: performance.now(),
      startTime: null,
      stopTime: null,
      timerStarted: false,
      slowUntil: 0,
      flashStart: null,
      flashDuration: 0,
      flashCycles: 0,
    };

    function resetGame() {
      car.x = 0;
      car.speed = 0;
      car.distance = 0;
      state.finished = false;
      state.confetti = [];
      state.obstacles = generateObstacles();
      state.lastTime = performance.now();
      state.startTime = null;
      state.stopTime = null;
      state.timerStarted = false;
      state.slowUntil = 0;
      state.flashStart = null;
      state.flashDuration = 0;
      state.flashCycles = 0;
      setStatus("Drive forward and avoid debris. Reach the glowing finish strip!", "");
    }

    function setStatus(text, variant) {
      hud.status.textContent = text;
      hud.status.className = `status ${variant}`.trim();
    }

    function generateObstacles() {
      const obstacles = [];
      const count = 36;
      const types = ["banana", "tire", "hose", "wrench"];
      const laneLimit = (road.width - car.width) / 2;
      const corridor = createSafeCorridor(laneLimit);
      const maxAttempts = count * 60;
      let attempts = 0;

      while (obstacles.length < count && attempts < maxAttempts) {
        attempts += 1;
        const distance = 180 + Math.random() * (road.length - 360);
        const type = types[obstacles.length % types.length];
        const size = 32 + Math.random() * 32;
        const dimensions = getObstacleSize(type, size);

        const lane = pickLaneAwayFromPath({
          distance,
          width: dimensions.width,
          laneLimit,
          corridor,
        });

        const candidate = { x: lane, distance, type, ...dimensions };
        if (!isTooCloseToOthers(candidate, obstacles)) {
          obstacles.push(candidate);
        }
      }

      return obstacles.sort((a, b) => a.distance - b.distance);
    }

    function createSafeCorridor(laneLimit) {
      const corridorWidth = Math.max(car.width * 2.4, 64);
      const centerBase = (Math.random() - 0.5) * laneLimit * 0.8;
      const wave = 60 + Math.random() * 30;

      return {
        width: corridorWidth,
        center(distance) {
          const offset = Math.sin(distance / 220) * wave;
          const raw = centerBase + offset;
          return Math.max(
            -laneLimit + corridorWidth / 2,
            Math.min(laneLimit - corridorWidth / 2, raw)
          );
        },
      };
    }

    function pickLaneAwayFromPath({ distance, width, laneLimit, corridor }) {
      const margin = corridor.width / 2 + width / 2 + 12;
      const safeCenter = corridor.center(distance);

      for (let attempt = 0; attempt < 16; attempt += 1) {
        const candidate = (Math.random() - 0.5) * laneLimit * 1.9;
        const clamped = Math.max(-laneLimit, Math.min(laneLimit, candidate));
        if (Math.abs(clamped - safeCenter) > margin) {
          return clamped;
        }
      }

      return safeCenter > 0 ? -laneLimit + width : laneLimit - width; // fallback away from the corridor
    }

    function isTooCloseToOthers(candidate, obstacles) {
      const lateralPadding = 18;
      const verticalPadding = 70;

      return obstacles.some((obs) => {
        const horizontalGap = Math.abs(candidate.x - obs.x);
        const verticalGap = Math.abs(candidate.distance - obs.distance);
        const allowedX = candidate.width / 2 + obs.width / 2 + lateralPadding;
        const allowedY = candidate.height / 2 + obs.height / 2 + verticalPadding;
        return horizontalGap < allowedX && verticalGap < allowedY;
      });
    }

    function getObstacleSize(type, base) {
      switch (type) {
        case "banana":
          return { width: base * 1.2, height: base * 0.6 };
        case "tire":
          return { width: base * 0.9, height: base * 0.9 };
        case "hose":
          return { width: base * 1.6, height: base * 0.5 };
        case "wrench":
        default:
          return { width: base * 1.1, height: base * 0.5 };
      }
    }

    function update(delta, now) {
      if (state.finished) return;

      const timeScale = delta / 16.67; // Normalize against ~60 FPS

      const underSlowdown = state.slowUntil > now;

      if (!underSlowdown && state.keys.has("ArrowUp")) {
        const wasStopped = car.speed <= 0;
        car.speed = Math.min(car.speed + car.acceleration * timeScale, car.maxSpeed);
        if (wasStopped && car.speed > 0 && !state.timerStarted) {
          state.startTime = now;
          state.timerStarted = true;
        }
      }

      if (underSlowdown) {
        car.speed = 0;
      }

      if (state.keys.has("ArrowLeft")) {
        car.x -= car.steering * timeScale;
      }
      if (state.keys.has("ArrowRight")) {
        car.x += car.steering * timeScale;
      }

      const laneLimit = (road.width - car.width) / 2;
      car.x = Math.max(Math.min(car.x, laneLimit), -laneLimit);

      car.distance = Math.min(car.distance + car.speed * 7 * timeScale, road.length);

      detectCollision(now);
      if (car.distance >= road.length) {
        state.finished = true;
        state.stopTime = now;
        setStatus("You reached the finish! Press R to race again.", "win");
        launchConfetti();
      }
    }

    function launchConfetti() {
      const colors = ["#fbbf24", "#22c55e", "#38bdf8", "#f472b6", "#e0f2fe", "#c084fc"];
      const count = 150;
      const roadCenter = canvas.width / 2;
      const carScreenX = roadCenter + car.x;
      const spread = Math.max(road.width * 0.55, car.width * 8);
      const carFrontY = camera.baseY - car.height * 1.1;

      for (let i = 0; i < count; i += 1) {
        const angle = (Math.random() * Math.PI) / 1.1 + Math.PI;
        const speed = 6 + Math.random() * 4;
        state.confetti.push({
          x: carScreenX + (Math.random() - 0.5) * spread,
          y: carFrontY + (Math.random() - 0.5) * 18,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed * 0.8,
          size: 4 + Math.random() * 5,
          rotation: Math.random() * Math.PI * 2,
          rotationSpeed: (Math.random() - 0.5) * 0.25,
          color: colors[i % colors.length],
          life: 120 + Math.random() * 60,
        });
      }
    }

    function updateConfetti() {
      const gravity = 0.2;
      state.confetti.forEach((piece) => {
        piece.vy += gravity;
        piece.x += piece.vx;
        piece.y += piece.vy;
        piece.rotation += piece.rotationSpeed;
        piece.life -= 1;
      });

      state.confetti = state.confetti.filter((piece) => piece.life > 0 && piece.y < canvas.height + 40);
    }

    function detectCollision(now) {
      const carBox = {
        left: car.x - car.width / 2,
        right: car.x + car.width / 2,
        top: car.distance + car.height,
        bottom: car.distance,
      };

      for (let i = 0; i < state.obstacles.length; i += 1) {
        const obstacle = state.obstacles[i];
        const obsBox = {
          left: obstacle.x - obstacle.width / 2,
          right: obstacle.x + obstacle.width / 2,
          top: obstacle.distance + obstacle.height,
          bottom: obstacle.distance,
        };

        const overlapX = carBox.left < obsBox.right && carBox.right > obsBox.left;
        const overlapY = carBox.bottom < obsBox.top && carBox.top > obsBox.bottom;

        if (overlapX && overlapY) {
          state.slowUntil = Math.max(state.slowUntil, now + COLLISION_STOP_DURATION_MS);
          car.speed = 0;
          state.obstacles.splice(i, 1);
          state.flashStart = now;
          state.flashDuration = COLLISION_STOP_DURATION_MS;
          state.flashCycles = FLASH_CYCLE_COUNT;
          setStatus("Obstacle hit—stopped for 2s while debris clears.", "bad");
          return;
        }
      }
    }

    function drawRoad() {
      const roadCenter = canvas.width / 2;
      const roadLeft = roadCenter - road.width / 2;
      const roadRight = roadCenter + road.width / 2;

      // Asphalt
      const gradient = ctx.createLinearGradient(roadLeft, 0, roadRight, 0);
      gradient.addColorStop(0, "#0f172a");
      gradient.addColorStop(0.5, "#111827");
      gradient.addColorStop(1, "#0f172a");
      ctx.fillStyle = gradient;
      ctx.fillRect(roadLeft - road.shoulder, 0, road.width + road.shoulder * 2, canvas.height);

      // Lane lines
      ctx.strokeStyle = "rgba(255,255,255,0.2)";
      ctx.lineWidth = road.laneMarkingWidth;
      ctx.setLineDash([16, 18]);
      ctx.beginPath();
      const lineY = camera.baseY - car.distance + road.length;
      ctx.moveTo(roadCenter, lineY % 34);
      for (let y = lineY % 34; y < canvas.height; y += 34) {
        ctx.moveTo(roadCenter, y);
        ctx.lineTo(roadCenter, y + 16);
      }
      ctx.stroke();
      ctx.setLineDash([]);

      // Shoulders
      ctx.fillStyle = "#0ea5e9";
      ctx.fillRect(roadLeft - road.shoulder, 0, road.shoulder, canvas.height);
      ctx.fillRect(roadRight, 0, road.shoulder, canvas.height);
    }

    function drawObstacles() {
      const roadCenter = canvas.width / 2;
      for (const obstacle of state.obstacles) {
        const y = camera.baseY - (obstacle.distance - car.distance);
        if (y < -120 || y > canvas.height + 140) continue;
        const x = roadCenter + obstacle.x;

        ctx.save();
        ctx.translate(x, y - obstacle.height / 2);

        switch (obstacle.type) {
          case "banana":
            drawBanana(obstacle);
            break;
          case "tire":
            drawTire(obstacle);
            break;
          case "hose":
            drawHose(obstacle);
            break;
          case "wrench":
          default:
            drawWrench(obstacle);
            break;
        }

        ctx.restore();
      }
    }

    function drawBanana(obstacle) {
      const { width, height } = obstacle;
      const curvature = height * 1.4;
      ctx.fillStyle = "#fbbf24";
      ctx.strokeStyle = "#f59e0b";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(-width / 2, height / 4);
      ctx.quadraticCurveTo(-width / 4, -curvature, width / 4, -height / 8);
      ctx.quadraticCurveTo(width / 2, curvature / 2, width / 2.4, height / 2);
      ctx.quadraticCurveTo(0, height * 0.8, -width / 2, height / 2);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = "#fef3c7";
      ctx.beginPath();
      ctx.moveTo(-width / 2.4, height / 3);
      ctx.quadraticCurveTo(-width / 6, -curvature * 0.5, width / 6, -height / 10);
      ctx.quadraticCurveTo(width / 2.8, curvature * 0.32, width / 3, height / 3);
      ctx.quadraticCurveTo(0, height * 0.65, -width / 2.4, height / 3);
      ctx.fill();
    }

    function drawTire(obstacle) {
      const radius = Math.min(obstacle.width, obstacle.height) / 2;
      const inner = radius * 0.55;
      ctx.fillStyle = "#0f172a";
      ctx.beginPath();
      ctx.arc(0, 0, radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "#1f2937";
      ctx.lineWidth = radius * 0.18;
      ctx.beginPath();
      ctx.arc(0, 0, radius * 0.8, 0, Math.PI * 2);
      ctx.stroke();

      ctx.fillStyle = "#94a3b8";
      ctx.beginPath();
      ctx.arc(0, 0, inner, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "rgba(255,255,255,0.25)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i = 0; i < 6; i += 1) {
        const angle = (Math.PI * 2 * i) / 6;
        const x = Math.cos(angle) * inner;
        const y = Math.sin(angle) * inner;
        ctx.moveTo(0, 0);
        ctx.lineTo(x, y);
      }
      ctx.stroke();
    }

    function drawHose(obstacle) {
      const { width, height } = obstacle;
      const thickness = Math.max(6, height * 0.4);
      ctx.lineWidth = thickness;
      ctx.lineCap = "round";
      ctx.strokeStyle = "#22c55e";
      ctx.beginPath();
      ctx.moveTo(-width / 2, -height / 3);
      ctx.bezierCurveTo(-width / 4, -height * 1.8, width / 4, height * 1.8, width / 2, height / 3);
      ctx.stroke();

      ctx.strokeStyle = "rgba(255,255,255,0.35)";
      ctx.lineWidth = thickness * 0.35;
      ctx.beginPath();
      ctx.moveTo(-width / 3, -height / 3.5);
      ctx.bezierCurveTo(-width / 6, -height * 1.2, width / 6, height * 1.2, width / 3, height / 3.5);
      ctx.stroke();
    }

    function drawWrench(obstacle) {
      const { width, height } = obstacle;
      const handleWidth = height * 0.55;
      const headWidth = height * 1.2;
      const headLength = width * 0.35;

      ctx.fillStyle = "#cbd5e1";
      ctx.strokeStyle = "#94a3b8";
      ctx.lineWidth = 3;

      // Handle
      ctx.beginPath();
      ctx.roundRect(-width / 2, -handleWidth / 2, width - headLength, handleWidth, handleWidth / 2.2);
      ctx.fill();
      ctx.stroke();

      // Head open end
      ctx.beginPath();
      ctx.moveTo(width / 2 - headLength, -headWidth / 2);
      ctx.lineTo(width / 2, -headWidth / 3);
      ctx.lineTo(width / 2 - headLength / 1.6, -height * 0.2);
      ctx.lineTo(width / 2 - headLength / 1.6, height * 0.2);
      ctx.lineTo(width / 2, headWidth / 3);
      ctx.lineTo(width / 2 - headLength, headWidth / 2);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      // Bolt hole
      ctx.fillStyle = "#94a3b8";
      ctx.beginPath();
      ctx.arc(width / 6, 0, handleWidth * 0.18, 0, Math.PI * 2);
      ctx.fill();
    }

    function getCarPalette(mode) {
      switch (mode) {
        case "red":
          return {
            bodyStart: "#fca5a5",
            bodyEnd: "#ef4444",
            nose: "#fecaca",
            wing: "#dc2626",
            side: "#f87171",
            rear: "#dc2626",
            roll: "#991b1b",
          };
        case "blue":
          return {
            bodyStart: "#bfdbfe",
            bodyEnd: "#3b82f6",
            nose: "#e0f2fe",
            wing: "#1d4ed8",
            side: "#60a5fa",
            rear: "#1d4ed8",
            roll: "#0c4a6e",
          };
        default:
          return {
            bodyStart: "#38bdf8",
            bodyEnd: "#0284c7",
            nose: "#bae6fd",
            wing: "#1d4ed8",
            side: "#0ea5e9",
            rear: "#1d4ed8",
            roll: "#0c4a6e",
          };
      }
    }

    function drawCar() {
      const roadCenter = canvas.width / 2;
      const x = roadCenter + car.x;
      const y = camera.baseY;
      const top = y - car.height;
      const bodyWidth = car.width * 0.65;
      const noseTipY = top + car.height * 0.05;
      const bodyTop = top + car.height * 0.22;
      const bodyHeight = car.height * 0.7;

      let paletteMode = "default";
      if (state.flashStart !== null) {
        const elapsed = state.lastTime - state.flashStart;
        const totalDuration = state.flashDuration;
        const cycles = state.flashCycles || FLASH_CYCLE_COUNT;
        if (elapsed >= 0 && elapsed < totalDuration) {
          const totalPhases = cycles * 2;
          const phase = Math.floor((elapsed / totalDuration) * totalPhases);
          paletteMode = phase % 2 === 0 ? "red" : "blue";
        }
      }

      const palette = getCarPalette(paletteMode);

      // Main chassis
      const bodyGradient = ctx.createLinearGradient(x, top, x, y);
      bodyGradient.addColorStop(0, palette.bodyStart);
      bodyGradient.addColorStop(1, palette.bodyEnd);
      ctx.fillStyle = bodyGradient;
      ctx.roundRect(x - bodyWidth / 2, bodyTop, bodyWidth, bodyHeight, car.height * 0.18);
      ctx.fill();

      // Nose cone taper
      ctx.fillStyle = palette.nose;
      ctx.beginPath();
      ctx.moveTo(x - bodyWidth * 0.4, bodyTop + car.height * 0.1);
      ctx.lineTo(x + bodyWidth * 0.4, bodyTop + car.height * 0.1);
      ctx.lineTo(x, noseTipY);
      ctx.closePath();
      ctx.fill();

      // Front wing
      ctx.fillStyle = palette.wing;
      ctx.roundRect(
        x - car.width * 0.75,
        top + car.height * 0.12,
        car.width * 1.5,
        car.height * 0.12,
        car.height * 0.05
      );
      ctx.fill();

      // Side pods
      ctx.fillStyle = palette.side;
      ctx.roundRect(
        x - car.width * 0.55,
        top + car.height * 0.46,
        car.width * 1.1,
        car.height * 0.24,
        car.width * 0.18
      );
      ctx.fill();

      // Rear wing
      ctx.fillStyle = palette.rear;
      ctx.roundRect(
        x - car.width * 0.45,
        y - car.height * 0.2,
        car.width * 0.9,
        car.height * 0.08,
        car.height * 0.04
      );
      ctx.fill();

      // Cockpit canopy
      ctx.fillStyle = "rgba(255,255,255,0.9)";
      ctx.roundRect(
        x - bodyWidth * 0.35,
        top + car.height * 0.36,
        bodyWidth * 0.7,
        car.height * 0.22,
        car.height * 0.1
      );
      ctx.fill();

      // Roll hoop
      ctx.fillStyle = palette.roll;
      ctx.roundRect(
        x - car.width * 0.08,
        top + car.height * 0.28,
        car.width * 0.16,
        car.height * 0.14,
        car.height * 0.05
      );
      ctx.fill();

      // Tires
      ctx.fillStyle = "#0f172a";
      const tireWidth = Math.max(4, car.width * 0.34);
      const tireHeight = Math.max(8, car.height * 0.38);
      const tireOffsetX = car.width / 2 + tireWidth * 0.55;
      const frontY = top + car.height * 0.32;
      const rearY = y - car.height * 0.46;
      const tireRadius = Math.max(2, car.height * 0.08);
      ctx.roundRect(x - tireOffsetX - tireWidth, frontY, tireWidth, tireHeight, tireRadius);
      ctx.roundRect(x + tireOffsetX, frontY, tireWidth, tireHeight, tireRadius);
      ctx.roundRect(x - tireOffsetX - tireWidth, rearY, tireWidth, tireHeight, tireRadius);
      ctx.roundRect(x + tireOffsetX, rearY, tireWidth, tireHeight, tireRadius);
      ctx.fill();

      // Wheel highlights
      ctx.fillStyle = "rgba(255,255,255,0.16)";
      const highlightWidth = Math.max(3, tireWidth * 0.32);
      const highlightHeight = Math.max(6, tireHeight * 0.5);
      ctx.fillRect(x - tireOffsetX - tireWidth + highlightWidth * 0.4, frontY + highlightHeight * 0.35, highlightWidth, highlightHeight);
      ctx.fillRect(x + tireOffsetX + highlightWidth * 0.4, frontY + highlightHeight * 0.35, highlightWidth, highlightHeight);
      ctx.fillRect(x - tireOffsetX - tireWidth + highlightWidth * 0.4, rearY + highlightHeight * 0.35, highlightWidth, highlightHeight);
      ctx.fillRect(x + tireOffsetX + highlightWidth * 0.4, rearY + highlightHeight * 0.35, highlightWidth, highlightHeight);
    }

    function drawFinishLine() {
      const roadCenter = canvas.width / 2;
      const y = camera.baseY - (road.length - car.distance);
      const roadLeft = roadCenter - road.width / 2;
      const roadRight = roadCenter + road.width / 2;
      const stripeHeight = 12;

      if (y < -stripeHeight || y > canvas.height + stripeHeight) return;

      for (let i = 0; i < 10; i += 1) {
        const x = roadLeft + (i * (road.width / 10));
        ctx.fillStyle = i % 2 === 0 ? "#e2e8f0" : "#0f172a";
        ctx.fillRect(x, y, road.width / 10, stripeHeight);
      }

      ctx.fillStyle = "rgba(56, 189, 248, 0.35)";
      ctx.fillRect(roadLeft, y, road.width, stripeHeight * 2);
    }

    function drawScene() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawRoad();
      drawFinishLine();
      drawObstacles();
      drawConfetti();
      drawCar();
    }

    function drawConfetti() {
      state.confetti.forEach((piece) => {
        ctx.save();
        ctx.translate(piece.x, piece.y);
        ctx.rotate(piece.rotation);
        ctx.fillStyle = piece.color;
        ctx.fillRect(-piece.size / 2, -piece.size / 2, piece.size, piece.size * 0.8);
        ctx.restore();
      });
    }

    function formatElapsed(ms) {
      const seconds = Math.floor(ms / 1000);
      const millis = Math.floor(ms % 1000)
        .toString()
        .padStart(3, "0");
      return `${seconds}.${millis}`;
    }

    function updateHud() {
      hud.speed.textContent = Math.round(car.speed * SPEED_MPH_PER_UNIT);
      hud.distance.textContent = Math.round(car.distance);
      hud.obstacles.textContent = state.obstacles.length;
      const referenceTime = state.stopTime ?? performance.now();
      const elapsed =
        state.startTime === null ? 0 : Math.max(0, referenceTime - state.startTime);
      hud.timer.textContent = formatElapsed(elapsed);
    }

    function gameLoop(now = performance.now()) {
      const delta = now - state.lastTime;
      state.lastTime = now;

      update(delta, now);
      updateConfetti();
      drawScene();
      updateHud();

      requestAnimationFrame(gameLoop);
    }

    function handleKeyDown(event) {
      if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(event.key)) {
        event.preventDefault();
        state.keys.add(event.key);
      }

      if (event.key.toLowerCase() === "r") {
        resetGame();
      }
    }

    function handleKeyUp(event) {
      state.keys.delete(event.key);
    }

    window.addEventListener("keydown", handleKeyDown);
    window.addEventListener("keyup", handleKeyUp);

    resetGame();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
